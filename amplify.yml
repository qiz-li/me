version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22 || nvm install 22
        - npm ci
    build:
      commands:
        # Console env vars aren't exposed to the SSR runtime by default; write
        # the FILE_* ones into .env.production so the compute can read them.
        - env | grep -e '^FILE_' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
